

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Timer App</title>
    <style>
        :root {
            --primary: #000000;
            --success: #22c55e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 50vh;
        }

        h1 { margin-bottom: 10px; font-weight: 100; }

       
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            width: 50%;
            max-width: 10px;
            align-items: center;
        }

        .timer-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            flex: 1 1 280px; 
            max-width: 350px;
            text-align: center;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .timer-card card-3{
            color: #22c55e;

        }


        .timer-card.active {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .time-display {
            font-size: 1.5rem;
            font-variant-numeric: tabular-nums; 
            margin: 10px 0;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent; 
        }

        button:active { transform: scale(0.98); }
        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

       
        @media (max-width:5px) {
            .time-display { font-size: .5rem; }
            .timer-card { padding: 0.5px; }
        }
    </style>
</head>
<body>

    <h1>Virus Timers</h1>

    <div class="container">
        <div class="timer-card" id="card-1">
            <div class="label">1st Room  HV</div>
            <div class="time-display" id="display-1">15:00</div>
            <button onclick="runTimer(15 * 60, 'display-1', 'card-1', this)">Start</button>
        </div>

        <div class="timer-card" id="card-2">
            <div class="label">Second Room HV</div>
            <div class="time-display" id="display-2">15:00</div>
            <button onclick="runTimer(15 * 60, 'display-2', 'card-2', this)">Start</button>
        </div>

        <div class="timer-card" id="card-3">
            <div class="label">NIghtmare (4h)</div>
            <div class="time-display" id="display-3">4:00:00</div>
            <button onclick="runTimer(4 * 60 * 60, 'display-3', 'card-3', this)">Start</button>
        </div>
    </div>

    <script>
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;

            const hDisplay = h > 0 ? (h < 10 ? "0" + h : h) + ":" : "";
            const mDisplay = (m < 10 ? "0" + m : m) + ":";
            const sDisplay = s < 10 ? "0" + s : s;

            return hDisplay + mDisplay + sDisplay;
        }

        function runTimer(duration, displayId, cardId, btn) {
            let timeLeft = duration;
            const display = document.getElementById(displayId);
            const card = document.getElementById(cardId);
            
            btn.disabled = true;
            btn.innerText = "Next Virus";
            card.classList.add('active');

            setInterval(() => {
                if (timeLeft <= 0) {
                    timeLeft = duration; 
                } else {
                    timeLeft--;
                }
                display.textContent = formatTime(timeLeft);
            }, 1000);
        }
    </script>
</body>
</html>
